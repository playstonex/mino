rules:
  # 本地地址直连
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,169.254.0.0/16,DIRECT
  
  # 广告拦截
  - DOMAIN-SUFFIX,ad.com,REJECT
  
  # Google 服务使用代理
  - DOMAIN-SUFFIX,google.com,auto-proxy
  - DOMAIN-SUFFIX,googleapis.com,auto-proxy
  - DOMAIN-SUFFIX,googleusercontent.com,auto-proxy
  - DOMAIN-KEYWORD,google,auto-proxy
  
  # 常见国外服务使用代理
  - DOMAIN-SUFFIX,youtube.com,auto-proxy
  - DOMAIN-SUFFIX,facebook.com,auto-proxy
  - DOMAIN-SUFFIX,twitter.com,auto-proxy
  - DOMAIN-SUFFIX,instagram.com,auto-proxy
  
  # 中国大陆地址直连
  - GEOIP,CN,DIRECT,no-resolve
  
  # 其他流量使用代理
  - MATCH,auto-proxy


