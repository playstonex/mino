name: Build XCFramework

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. mate-1.0.0)"
        required: true
  push:
    paths:
      - "mate/**"
      - "build_xframework.sh"
    branches:
      - Alpha

jobs:
  build-xcframework:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout mihomo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build XCFramework
        run: |
          chmod +x build_xframework.sh
          ./build_xframework.sh unified

      - name: Zip XCFramework
        run: |
          cd build/xframework
          zip -r Mate.xcframework.zip Mate.xcframework
          echo "ZIP_SIZE=$(du -sh Mate.xcframework.zip | cut -f1)" >> $GITHUB_ENV

      - name: Compute checksum
        run: |
          cd build/xframework
          shasum -a 256 Mate.xcframework.zip > Mate.xcframework.zip.sha256
          cat Mate.xcframework.zip.sha256

      - name: Set release tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "RELEASE_TAG=mate-$(date +'%Y%m%d')-${SHORT_SHA}" >> $GITHUB_ENV
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Mate XCFramework ${{ env.RELEASE_TAG }}"
          body: |
            Mate.xcframework built from mihomo @ ${{ github.sha }}

            **Size:** ${{ env.ZIP_SIZE }}
            **Platforms:** iOS arm64, iOS Simulator arm64, macOS arm64+x86_64

            ### Usage in Violet
            Update `Violet/library/mate_version.txt` to `${{ env.RELEASE_TAG }}`
          files: |
            build/xframework/Mate.xcframework.zip
            build/xframework/Mate.xcframework.zip.sha256
          prerelease: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
